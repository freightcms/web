{{ define "styles" }}
<style>
    label {
        font-weight: 700;
        line-height: 1.5;
    }

    input {
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 1rem;
        margin: 0;
        padding: 0.5rem;
        width: 100%;
    }

    button {
        background-color: #007bff;
        border: 1px solid #007bff;
        border-radius: 4px;
        color: #fff;
        cursor: pointer;
        font-size: 1rem;
        margin: 0;
    }

    button:hover {
        background-color: #0056b3;
        border-color: #0042a2;
    }

    span.error {
        color: #dc3545;
        font-size: 0.875rem;
        margin: 0;
        padding: 0.5rem;
        width: 100%;
    }

    span.success {
        color: #28a745;
        font-size: 0.875rem;
        margin: 0;
        padding: 0.5rem;
        width: 100%;
    }

    span.warning {
        color: #ffc107;
        font-size: 0.875rem;
        margin: 0;
        padding: 0.5rem;
        width: 100%;
    }

    span.info {
        color: #17a2b8;
        font-size: 0.875rem;
        margin: 0;
        padding: 0.5rem;
        width: 100%;
    }

    fieldset {
        border: 0;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        column-gap: 1em;
        row-gap: 1em;
    }

    div[role="group"] {
        display: flex;
        flex-direction: column;
        column-gap: 1em;
        row-gap: 1em;
    }

    div[role="navigation"] {
        display: flex;
        justify-content: space-between;
        padding: 1rem;
    }

    a {
        color: #007bff;
        text-decoration: none;
    }

    button a {
        color: #fff;
        text-decoration: none;
        margin: 0.5em;
    }

    nav {
        display: flex;
        flex-direction: row;
        padding: 1rem;
        row-gap: 1em;
        column-gap: 1em;
        width: 100%;
    }

    nav > button {
        background-color: #007bff;
        border: 1px solid #007bff;
        border-radius: 4px;
        color: #fff;
        cursor: pointer;
        font-size: 1rem;
        padding: 0;
        margin: 0;
    }

    nav>* {
        margin: 0;
    }

    nav>select {
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
        padding: 0.5rem;
    }

    nav>select>option {
        font-size: 1rem;
    }

    nav > .end {
        justify-content: flex-end;
        width: 100%;
    }

    nav>input,
    nav>select>option>input {
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
        padding: 0.5rem;
    }

    table {
        border-collapse: collapse;
        width: 100%;
    }

    table>thead {
        background-color: #f8f9fa;
    }

    table>thead>tr {
        border-bottom: 1px solid #ccc;
    }

    table>thead>tr>th {
        font-weight: 700;
        padding: 0.5rem;
        text-align: left;
    }

    table>tbody {
        background-color: #fff;
    }

    table>tbody>tr {
        border-bottom: 1px solid #ccc;
    }

    table>tbody>tr:hover {
        background-color: #f8f9fa;
    }

    table>tbody>tr>td {
        padding: 0.5rem;
    }

    table>tbody>tr>td:hover {
        background-color: #f8f9fa;
    }

    .dropdown {
        position: relative;
        display: inline-block;
    }

    .dropdown-content {
        display: none;
        position: absolute;
        min-width: 160px;
        z-index: 1;
    }

    .dropdown-content a {
        color: black;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
    }

    .dropdown:hover .dropdown-content {
        display: block;
    }
    .justify-end {
        display: flex;
        justify-content: flex-end;
    }
</style>
{{ end }}
