{{ define "styles" }}
<style>
    label {
        font-weight: 700;
        line-height: 1.5;
    }

    input {
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 1rem;
        margin: 0;
        padding: 0.5rem;
        width: 100%;
    }

    button {
        background-color: #007bff;
        border: 1px solid #007bff;
        border-radius: 4px;
        color: #fff;
        cursor: pointer;
        font-size: 1rem;
        margin: 0;
        padding: 0.5rem;
        width: 100%;
    }

    button:hover {
        background-color: #0056b3;
        border-color: #0042a2;
    }

    span.error {
        color: #dc3545;
        font-size: 0.875rem;
        margin: 0;
        padding: 0.5rem;
        width: 100%;
    }
    span.success {
        color: #28a745;
        font-size: 0.875rem;
        margin: 0;
        padding: 0.5rem;
        width: 100%;
    }
    span.warning {
        color: #ffc107;
        font-size: 0.875rem;
        margin: 0;
        padding: 0.5rem;
        width: 100%;
    }
    span.info {
        color: #17a2b8;
        font-size: 0.875rem;
        margin: 0;
        padding: 0.5rem;
        width: 100%;
    }

    fieldset {
        border: 0;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        column-gap: 1em;
        row-gap: 1em;
    }

    div[role="group"] {
        display: flex;
        flex-direction: column;
        column-gap: 1em;
        row-gap: 1em;
    }
</style>
{{ end }}
